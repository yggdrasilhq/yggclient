# Copy to yggclient.local.toml and adjust for your workstation or phone.
# The generated shell profile still lives at config/profiles.local.env for compatibility.

[identity]
profile_name = "laptop"
user_name = "alice"
user_home = "/home/alice"

[network]
ssh_host = "example-host"
ssh_user = "alice"
apt_http_proxy = ""
apt_https_proxy = ""

[sync]
enable_yggsync = true
yggsync_repo = "https://github.com/yggdrasilhq/yggsync"
yggsync_config = "~/.config/ygg_sync.toml"
samba_host = "nas.lan"
samba_share = "data"
samba_user = "alice"
samba_username = "alice"
samba_password_env = "SAMBA_PASSWORD"
screencasts_remote = "immich02/alice/desktop/Screencasts"

[services]
install_desktop_timer = true
install_shift_sync = false
install_kmonad = false
